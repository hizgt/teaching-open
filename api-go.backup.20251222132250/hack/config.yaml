
# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: "mysql:root:root@tcp(127.0.0.1:3306)/teachingopen"
        tables: ""
        removePrefix: ""
        descriptionTag: true
        noModelComment: false
        path: "internal"
        jsonCase: "CamelLower"

  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - teaching-open